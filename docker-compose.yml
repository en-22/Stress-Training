version: "3.9"

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: *
      MYSQL_DATABASE: stressTraining
      MYSQL_USER: *
      MYSQL_PASSWORD: *
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "3003:3003"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8000:80"

volumes:
  db_data:
